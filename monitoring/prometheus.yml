global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml   

scrape_configs:
  - job_name: 'self_healing_app'
    static_configs:
      - targets: ['app-service:80']

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"