apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    rule_files:
      - /etc/prometheus/alert_rules.yml

    scrape_configs:
      - job_name: 'app-service'
        static_configs:
          - targets: ['app-service:80']

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "alertmanager:9093"