apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    route:
      receiver: "default"
      group_wait: 5s
      group_interval: 10s
      repeat_interval: 30s

    receivers:
      - name: "default"
        webhook_configs:
          - url: "http://healer-service:5001/webhook"
            send_resolved: true